<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 학습 결과 | 꿈담길 × 에듀원탑AI × 배틀학습</title>
<link rel="stylesheet" href="quiz.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: var(--qz-bg); color: var(--qz-text); min-height: 100vh; }

  /* 도넛 애니메이션 */
  .donut-ring { transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1); }

  /* 빈 상태 */
  .empty-state {
    text-align: center; padding: 80px 24px;
  }
  .empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; }
  .empty-state h2 { font-size: 1.3rem; font-weight: 700; color: var(--qz-muted); margin-bottom: 10px; }
  .empty-state p  { font-size: 0.9rem; color: var(--qz-muted); margin-bottom: 24px; }
  .empty-state a  {
    display: inline-block; padding: 12px 24px;
    background: var(--qz-primary); color: #fff; border-radius: 10px;
    font-weight: 700; text-decoration: none; font-size: 0.95rem;
  }

  /* 타임라인 */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .tl-item  { display: flex; gap: 16px; }
  .tl-line  { display: flex; flex-direction: column; align-items: center; }
  .tl-dot   { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .tl-vert  { flex: 1; width: 2px; background: var(--qz-border); margin: 4px 0; }
  .tl-item:last-child .tl-vert { display: none; }
  .tl-body  { padding-bottom: 20px; flex: 1; }
  .tl-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
  .tl-meta  { font-size: 0.78rem; color: var(--qz-muted); margin-bottom: 8px; }
  .tl-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .tl-chip  {
    padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
  }
  .chip-pass   { background: #dcfce7; color: #166534; }
  .chip-warn   { background: #fef3c7; color: #92400e; }
  .chip-fail   { background: #fee2e2; color: #991b1b; }
  .chip-score  { background: #dbeafe; color: #1e40af; }

  /* 섹션 카드 그리드 */
  .sect-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 16px; }
  .sect-card { background: var(--qz-card); border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; }
  .sect-card-top { padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
  .sect-card-body { padding: 14px 18px; border-top: 1px solid var(--qz-border); }
  .sect-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; color: #fff; flex-shrink: 0; }
  .sect-name { font-size: 0.88rem; font-weight: 700; }
  .sect-status { margin-left: auto; font-size: 1.2rem; }
  .sect-stat-row { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 6px; }
  .sect-stat-row .label { color: var(--qz-muted); }
  .sect-stat-row .val   { font-weight: 700; }
  .sect-mini-bar { height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .sect-mini-fill { height: 100%; border-radius: 3px; transition: width .8s ease; }

  /* 문제별 아코디언 */
  .qa-list { display: flex; flex-direction: column; gap: 10px; }
  .qa-item { background: var(--qz-card); border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
  .qa-head {
    display: flex; align-items: center; gap: 10px; padding: 13px 16px;
    cursor: pointer; user-select: none;
  }
  .qa-head:hover { background: #f8fafc; }
  .qa-icon  { font-size: 1.1rem; flex-shrink: 0; }
  .qa-q     { font-size: 0.88rem; font-weight: 600; flex: 1; line-height: 1.45; }
  .qa-score { font-size: 0.8rem; font-weight: 700; color: var(--qz-primary); white-space: nowrap; }
  .qa-arrow { font-size: 0.75rem; color: var(--qz-muted); transition: transform .2s; flex-shrink: 0; }
  .qa-item.open .qa-arrow { transform: rotate(180deg); }
  .qa-body  { display: none; padding: 12px 16px 16px; border-top: 1px solid var(--qz-border); font-size: 0.84rem; }
  .qa-item.open .qa-body { display: block; }
  .qa-row   { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
  .qa-row-l { min-width: 68px; color: var(--qz-muted); font-weight: 600; }

  @media(max-width:640px){
    .stats-dashboard { padding: 10px; }
    .stats-topbar    { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
    .stats-topbar h1 { font-size: 1rem; }
    .topbar-right    { gap: 8px; flex-wrap: wrap; }
    .sect-grid       { grid-template-columns: 1fr; }
    .stats-tabs      { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
    .stats-tabs::-webkit-scrollbar { display: none; }
    .stats-tab       { font-size: 0.8rem; padding: 9px 14px; white-space: nowrap; flex-shrink: 0; }
    .stats-section-body { padding: 12px; }
    .stats-kpi-row   { gap: 8px; }
    .stats-kpi-card  { padding: 12px 10px; min-width: 0; }
    .kpi-v           { font-size: 1.5rem; }
    .kpi-l           { font-size: 0.72rem; }
    .donut-wrap      { flex-direction: column; align-items: flex-start; gap: 14px; }
    .qa-row          { flex-direction: column; gap: 3px; }
    .qa-row-l        { min-width: unset; }
    table            { font-size: 0.78rem; }
    thead th, tbody td { padding: 8px 9px; }
  }
</style>
</head>
<body class="stats-page">

<!-- 헤더 -->
<div class="stats-topbar">
  <div>
    <h1 id="pageTitle">📊 내 학습 결과</h1>
    <div class="topbar-sub" id="pageSubtitle">개인 퀴즈 성취 기록</div>
  </div>
  <div class="topbar-right">
    <span class="topbar-user" id="userChip">—</span>
    <a href="index.html" style="text-decoration:none">
      <button class="stats-logout-btn">← 영상으로 돌아가기</button>
    </a>
  </div>
</div>

<!-- 본문 -->
<div class="stats-dashboard" id="mainContent">
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">📭</div>
    <h2>아직 퀴즈 기록이 없어요</h2>
    <p>영상을 시청하며 퀴즈에 참여하면<br>이곳에 결과가 저장됩니다.</p>
    <a href="index.html">영상 보러 가기 →</a>
  </div>
</div>

<script src="quiz-data.js"></script>
<script>
'use strict';

/* ── URL 파라미터에서 이름 추출 ── */
function getNameFromURL() {
  const p = new URLSearchParams(location.search);
  return p.get('name') || localStorage.getItem('quiz_last_user') || '';
}

/* ── localStorage 로드 ── */
function loadResults(name) {
  try { return JSON.parse(localStorage.getItem(`quiz_results_${name}`) || '[]'); }
  catch { return []; }
}

/* ── 색상 팔레트 ── */
const SECT_COLORS = ['#3b82f6','#f59e0b','#10b981','#8b5cf6','#ec4899','#0ea5e9'];

function pctClass(pct) {
  return pct >= 70 ? 'success' : pct >= 40 ? 'warning' : 'danger';
}
function pctColor(pct) {
  return pct >= 70 ? '#16a34a' : pct >= 40 ? '#d97706' : '#dc2626';
}
function resultIcon(r) {
  if (r.correct === r.total) return '✅';
  if (r.correct > 0)         return '⚠️';
  return '❌';
}
function fmtTime(ms) {
  const s = Math.round(ms / 1000);
  const m = Math.floor(s / 60);
  return m > 0 ? `${m}분 ${s % 60}초` : `${s}초`;
}
function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

/* ── 도넛 SVG ── */
function donutSVG(pct, color, size=90) {
  const r = 35, cx = 45, cy = 45;
  const circ = 2 * Math.PI * r;
  const dash  = (pct / 100) * circ;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 90 90">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="10"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
        stroke-dasharray="${dash} ${circ - dash}"
        stroke-dashoffset="${circ * 0.25}"
        stroke-linecap="round" class="donut-ring"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="800" fill="${color}">${pct}%</text>
    </svg>`;
}

/* ══════════════════════════════════════
   메인 렌더링
   ══════════════════════════════════════ */
function render() {
  const name = getNameFromURL();
  const all  = name ? loadResults(name) : [];

  document.getElementById('userChip').textContent     = name || '이름 없음';
  document.getElementById('pageTitle').textContent    = `📊 ${name}님의 학습 결과`;
  document.getElementById('pageSubtitle').textContent = `총 ${all.length}회 퀴즈 참여`;

  const main = document.getElementById('mainContent');

  if (!name || !all.length) {
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  /* ── KPI ── */
  const totalCorrect = all.reduce((s,r) => s + r.correct, 0);
  const totalQ       = all.reduce((s,r) => s + r.total,   0);
  const totalScore   = all.reduce((s,r) => s + r.score,   0);
  const totalMax     = all.reduce((s,r) => s + r.maxScore, 0);
  const accuracy     = totalQ ? Math.round((totalCorrect / totalQ) * 100) : 0;
  const passCount    = all.filter(r => r.correct === r.total).length;
  const avgElapsed   = (() => {
    const times = all.flatMap(r => r.details.map(d => d.elapsed || 0)).filter(Boolean);
    return times.length ? Math.round(times.reduce((a,b)=>a+b,0)/times.length) : 0;
  })();

  /* ── 섹션별 집계 ── */
  const sectMap = {}; // sectionIdx → {records:[], correct, total, score, maxScore}
  all.forEach(r => {
    if (!sectMap[r.sectionIdx]) sectMap[r.sectionIdx] = { records:[], correct:0, total:0, score:0, maxScore:0 };
    const s = sectMap[r.sectionIdx];
    s.records.push(r);
    s.correct  += r.correct;
    s.total    += r.total;
    s.score    += r.score;
    s.maxScore += r.maxScore;
  });

  const completedSections = Object.keys(sectMap).length;

  main.innerHTML = `

  <!-- ── KPI 행 ── -->
  <div class="stats-kpi-row">
    <div class="stats-kpi-card">
      <div class="kpi-l">완료 섹션</div>
      <div class="kpi-v">${completedSections}<span style="font-size:1rem;color:var(--qz-muted);font-weight:400"> / 6</span></div>
    </div>
    <div class="stats-kpi-card ${pctClass(accuracy)}">
      <div class="kpi-l">전체 정답률</div>
      <div class="kpi-v" style="color:${pctColor(accuracy)}">${accuracy}%</div>
      <div class="kpi-u">${totalCorrect} / ${totalQ} 문제</div>
    </div>
    <div class="stats-kpi-card">
      <div class="kpi-l">획득 점수</div>
      <div class="kpi-v" style="color:var(--qz-primary)">${totalScore}<span style="font-size:1rem;color:var(--qz-muted);font-weight:400"> / ${totalMax}점</span></div>
    </div>
    <div class="stats-kpi-card success">
      <div class="kpi-l">퀴즈 통과</div>
      <div class="kpi-v" style="color:var(--qz-success)">${passCount}<span style="font-size:1rem;color:var(--qz-muted);font-weight:400"> 회</span></div>
    </div>
    <div class="stats-kpi-card">
      <div class="kpi-l">평균 풀이 시간</div>
      <div class="kpi-v">${fmtTime(avgElapsed)}</div>
    </div>
  </div>

  <!-- ── 탭 ── -->
  <div class="stats-tabs">
    <button class="stats-tab active" onclick="switchTab('overview',this)">📈 종합 요약</button>
    <button class="stats-tab" onclick="switchTab('sections',this)">📚 섹션별 분석</button>
    <button class="stats-tab" onclick="switchTab('timeline',this)">🕐 시간 순 기록</button>
    <button class="stats-tab" onclick="switchTab('questions',this)">❓ 문제별 상세</button>
  </div>

  <!-- ── 종합 요약 ── -->
  <div id="tab-overview" class="stats-tab-panel active">
    <div class="stats-section">
      <div class="stats-section-header">
        <h3>섹션별 정답률</h3>
      </div>
      <div class="stats-section-body">
        <div class="bar-chart">
          ${QUIZ_DATA.sections.map((s,i) => {
            const sd  = sectMap[i];
            const pct = sd ? Math.round((sd.correct / sd.total) * 100) : null;
            const cls = pct === null ? '' : pctClass(pct);
            return `<div class="bar-row">
              <span class="bar-label" style="color:${SECT_COLORS[i]};font-weight:700">${s.ko.replace('섹션 ','S').replace(': ',':\n')}</span>
              <div class="bar-track">
                <div class="bar-fill ${cls}" style="width:${pct ?? 0}%;background:${sd ? pctColor(pct) : '#e2e8f0'}"></div>
              </div>
              <span class="bar-val">${pct !== null ? pct + '%' : '–'}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:0">
      <!-- 도넛: 정답률 -->
      <div class="stats-section">
        <div class="stats-section-header"><h3>전체 정답률</h3></div>
        <div class="stats-section-body">
          <div class="donut-wrap" style="justify-content:center">
            ${donutSVG(accuracy, pctColor(accuracy), 110)}
            <div class="donut-legend">
              <div class="donut-legend-item"><span class="donut-dot" style="background:${pctColor(accuracy)}"></span>정답 ${totalCorrect}문제</div>
              <div class="donut-legend-item"><span class="donut-dot" style="background:#e2e8f0"></span>오답 ${totalQ - totalCorrect}문제</div>
            </div>
          </div>
        </div>
      </div>
      <!-- 도넛: 점수 -->
      <div class="stats-section">
        <div class="stats-section-header"><h3>점수 달성률</h3></div>
        <div class="stats-section-body">
          <div class="donut-wrap" style="justify-content:center">
            ${donutSVG(totalMax ? Math.round((totalScore/totalMax)*100) : 0, '#3b82f6', 110)}
            <div class="donut-legend">
              <div class="donut-legend-item"><span class="donut-dot" style="background:#3b82f6"></span>획득 ${totalScore}점</div>
              <div class="donut-legend-item"><span class="donut-dot" style="background:#e2e8f0"></span>미획득 ${totalMax - totalScore}점</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 섹션별 분석 ── -->
  <div id="tab-sections" class="stats-tab-panel">
    <div class="sect-grid">
      ${QUIZ_DATA.sections.map((s,i) => {
        const sd  = sectMap[i];
        const pct = sd ? Math.round((sd.correct / sd.total) * 100) : null;
        const tries = sd ? sd.records.length : 0;
        const lastR = sd ? sd.records[sd.records.length-1] : null;
        const icon  = !sd ? '⬜' : lastR.correct === lastR.total ? '✅' : lastR.correct > 0 ? '⚠️' : '❌';
        const fillColor = pct !== null ? pctColor(pct) : '#e2e8f0';
        return `
          <div class="sect-card">
            <div class="sect-card-top">
              <div class="sect-num" style="background:${SECT_COLORS[i]}">${i+1}</div>
              <div class="sect-name">${s.ko.replace(/^섹션 \d+: /,'')}</div>
              <span class="sect-status">${icon}</span>
            </div>
            <div class="sect-card-body">
              <div class="sect-stat-row"><span class="label">정답률</span><span class="val" style="color:${fillColor}">${pct !== null ? pct+'%' : '미완료'}</span></div>
              <div class="sect-stat-row"><span class="label">획득 점수</span><span class="val">${sd ? sd.score+' / '+sd.maxScore+'점' : '–'}</span></div>
              <div class="sect-stat-row"><span class="label">도전 횟수</span><span class="val">${tries}회</span></div>
              <div class="sect-mini-bar"><div class="sect-mini-fill" style="width:${pct ?? 0}%;background:${fillColor}"></div></div>
            </div>
          </div>`;
      }).join('')}
    </div>
  </div>

  <!-- ── 시간 순 기록 ── -->
  <div id="tab-timeline" class="stats-tab-panel">
    <div class="stats-section">
      <div class="stats-section-header"><h3>참여 이력 (최신순)</h3></div>
      <div class="stats-section-body">
        <div class="timeline">
          ${[...all].reverse().map(r => {
            const icon  = resultIcon(r);
            const pct   = Math.round((r.correct / r.total) * 100);
            const color = pctColor(pct);
            const chipCls = r.correct === r.total ? 'chip-pass' : r.correct > 0 ? 'chip-warn' : 'chip-fail';
            return `
              <div class="tl-item">
                <div class="tl-line">
                  <div class="tl-dot" style="background:${color}"></div>
                  <div class="tl-vert"></div>
                </div>
                <div class="tl-body">
                  <div class="tl-title">${icon} ${r.sectionName}</div>
                  <div class="tl-meta">${fmtDate(r.timestamp)}</div>
                  <div class="tl-chips">
                    <span class="tl-chip ${chipCls}">${r.correct}/${r.total} 정답</span>
                    <span class="tl-chip chip-score">${r.score}점</span>
                    ${r.details.map(d=>`<span class="tl-chip" style="background:#f1f5f9;color:var(--qz-muted)">${d.isCorrect?'✅':'❌'} ${d.choiceCnt}지선다</span>`).join('')}
                  </div>
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  </div>

  <!-- ── 문제별 상세 ── -->
  <div id="tab-questions" class="stats-tab-panel">
    <div class="stats-section">
      <div class="stats-section-header">
        <h3>문제별 풀이 기록</h3>
        <button class="export-btn" onclick="exportCSV()">⬇ CSV 내보내기</button>
      </div>
      <div class="stats-section-body">
        <div class="qa-list">
          ${all.flatMap(r =>
            r.details.map((d,di) => `
              <div class="qa-item" onclick="this.classList.toggle('open')">
                <div class="qa-head">
                  <span class="qa-icon">${d.isCorrect ? '✅' : '❌'}</span>
                  <span class="qa-q">${d.question}</span>
                  <span class="qa-score">${d.pts}점</span>
                  <span class="qa-arrow">▼</span>
                </div>
                <div class="qa-body">
                  <div class="qa-row"><span class="qa-row-l">섹션</span><span>${r.sectionName}</span></div>
                  <div class="qa-row"><span class="qa-row-l">내 답</span><span style="color:${d.isCorrect?'var(--qz-success)':'var(--qz-danger)'};font-weight:700">${d.userAns}</span></div>
                  <div class="qa-row"><span class="qa-row-l">정답</span><span style="font-weight:700">${d.correctAns}</span></div>
                  <div class="qa-row"><span class="qa-row-l">선다 수</span><span>${d.choiceCnt}지선다 (배점 ${d.choiceCnt}점)</span></div>
                  <div class="qa-row"><span class="qa-row-l">풀이 시간</span><span>${fmtTime(d.elapsed||0)}</span></div>
                  <div class="qa-row"><span class="qa-row-l">일시</span><span>${fmtDate(r.timestamp)}</span></div>
                </div>
              </div>`)
          ).join('')}
        </div>
      </div>
    </div>
  </div>

  `;
}

/* ── 탭 전환 ── */
function switchTab(id, btn) {
  document.querySelectorAll('.stats-tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.stats-tab').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById('tab-' + id);
  if (panel) panel.classList.add('active');
  if (btn)  btn.classList.add('active');
}

/* ── CSV 내보내기 ── */
function exportCSV() {
  const name = getNameFromURL();
  const all  = loadResults(name);
  const rows = [['이름','섹션','문제','내답','정답','정오','점수','선다수','풀이시간(초)','일시']];
  all.forEach(r =>
    r.details.forEach(d =>
      rows.push([name, r.sectionName, d.question, d.userAns, d.correctAns,
        d.isCorrect?'정답':'오답', d.pts, d.choiceCnt,
        Math.round((d.elapsed||0)/1000), r.timestamp])
    )
  );
  const csv  = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: `${name}_results.csv` });
  a.click(); URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
